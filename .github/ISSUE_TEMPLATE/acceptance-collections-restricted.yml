name: "Acceptance - Collections and Restricted Public Access"
description: "Validate Collections and Restricted Public Access"
title: "[Acceptance][Collections/Restricted] "
labels:
  - acceptance-testing
  - collections
  - restricted-access

body:
  - type: markdown
    attributes:
      value: |
        Validate Collections and Restricted Public Access functionality.

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: testdata.nist.gov
    validations:
      required: true

  - type: input
    id: tester
    attributes:
      label: Tester
      placeholder: Your name
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Collections"

  - type: checkboxes
    id: collection_checks
    attributes:
      label: Collections Checklist
      options:
        - label: Page features appropriate image and color scheme
        - label: Left-side filters include collection-specific research areas
        - label: Bar above dataset listing includes number of datasets, page selection, sort-by selection box, and free-text filtering
        - label: Each dataset entry includes title link and “Access Data” link; title link always goes to PDR landing page

  - type: markdown
    attributes:
      value: "## Collection Member Landing Page"

  - type: checkboxes
    id: member_checks
    attributes:
      label: Collection Member Checklist
      options:
        - label: “Part of the..” statement appears under title with working collection link
        - label: Collection-specific research topics are listed (next to NIST taxonomy terms).

  - type: markdown
    attributes:
      value: "## Restricted Public Access"

  - type: checkboxes
    id: restricted_checks
    attributes:
      label: Restricted Access Checklist
      options:
        - label: File listing includes download icons for public files and no icons for restricted files
        - label: Landing Page includes “Download Data” button link
        - label: Clicking “Download Data” button brings up download request form
        - label: Request-to-Download workflow works

  - type: textarea
    id: failures
    attributes:
      label: Failures / Defects Found

  - type: dropdown
    id: result
    attributes:
      label: Overall Result
      options:
        - ✅ Pass
        - ⚠️ Pass with follow-ups
        - ❌ Fail
    validations:
      required: true
